<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>重訓進度筆記 V29.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        :root {
            --primary: #00d1b2;
            --primary-soft: rgba(0, 209, 178, 0.1);
            --dark: #0a0a0a;
            --card: #141414;
            --input-bg: #1c1c1c;
            --text: #ffffff;
            --text-dim: #666666;
            --highlight: #ffdd57;
            --grad: linear-gradient(135deg, #00d1b2 0%, #00a896 100%);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 驗證遮罩 */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--card);
            padding: 50px 40px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #222;
            width: 85%; max-width: 360px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* 導覽列 */
        .nav {
            display: flex;
            background: rgba(10, 10, 10, 0.98);
            position: sticky;
            top: 0; z-index: 1000;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #1a1a1a;
        }
        .nav-item {
            flex: 1; text-align: center; padding: 22px 0;
            font-size: 11px; color: #444; cursor: pointer;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .page-container { padding: 20px; max-width: 600px; margin: 0 auto; display: none; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 進度卡片 */
        .evolution-card {
            background: #181818;
            border: 1px solid #222;
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
        }
        .rank-status { font-size: 10px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
        .rank-title { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 15px; letter-spacing: -0.5px; }
        .xp-container { height: 10px; background: #000; border-radius: 10px; margin: 25px 0 10px; overflow: hidden; border: 1px solid #222; }
        .xp-fill { 
            height: 100%; background: var(--grad); width: 0%; 
            transition: width 2s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 15px var(--primary-soft);
        }
        .xp-stats { font-size: 12px; color: var(--text-dim); margin-top: 10px; font-weight: 500; }

        .card {
            background: var(--card);
            padding: 28px;
            border-radius: 35px;
            margin-bottom: 25px;
            border: 1px solid #1f1f1f;
        }

        h2 { font-size: 22px; font-weight: 800; margin-bottom: 25px; margin-left: 5px; color: #eee; }
        label { display: block; color: #555; font-size: 10px; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }

        select, input {
            width: 100%; padding: 18px; margin-bottom: 22px;
            border-radius: 18px; border: 1px solid #252525;
            background: var(--input-bg); color: white; font-size: 16px;
        }
        select:focus, input:focus { border-color: var(--primary); outline: none; background: #222; }

        .btn-set { width: 100%; padding: 22px; border: none; border-radius: 22px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-set.primary { background: var(--grad); color: #000; box-shadow: 0 10px 25px rgba(0, 209, 178, 0.2); }
        .btn-set:active { transform: scale(0.97); }

        .history-card {
            background: #1a1a1a; padding: 22px; border-radius: 25px; margin-bottom: 12px;
            border: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
        }
        .history-title { font-weight: 700; font-size: 15px; color: #fff; }
        .history-data { color: var(--primary); font-weight: 800; font-size: 14px; }

        .btn-sync { width: 100%; padding: 20px; background: #2c3e50; color: white; border: none; border-radius: 20px; font-weight: 700; margin-top: 15px; }

        .part-filter { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 25px; scrollbar-width: none; }
        .part-btn { flex: 0 0 auto; padding: 12px 24px; background: #1a1a1a; border-radius: 35px; border: none; color: #555; font-size: 12px; font-weight: 700; }
        .part-btn.active { background: #eee; color: #000; }

        #analysis-loader { text-align: center; color: var(--primary); font-weight: bold; padding: 10px; font-size: 11px; display: none; }
    </style>
</head>
<body>

    <!-- 驗證 -->
    <div id="login-overlay">
        <div class="login-card">
            <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
            <h3 style="margin: 0; font-weight: 900; letter-spacing: 1px;">重訓進度管理</h3>
            <p style="color: #444; font-size: 12px; margin-top: 10px; margin-bottom: 30px;">數據化您的每一分努力</p>
            <input type="password" id="login-pwd" placeholder="認證密碼" style="text-align: center;">
            <button class="btn-set primary" onclick="checkLogin()">驗證登入</button>
            <p id="login-err" style="color: var(--danger); font-size: 12px; margin-top: 15px; display: none;">驗證失敗</p>
        </div>
    </div>

    <!-- 主介面 -->
    <div id="main-content" class="page-container">
        <div class="nav">
            <div class="nav-item active" onclick="showPage('record', this)">紀錄</div>
            <div class="nav-item" onclick="showPage('analysis', this)">分析</div>
            <div class="nav-item" onclick="showPage('recommend', this)">指南</div>
        </div>

        <!-- 訓練登錄 -->
        <div id="page-record" class="tab-content active">
            <h2>⚡ 訓練登錄</h2>
            <div class="card">
                <label>日期</label>
                <input type="date" id="record-date">
                
                <label>動作名稱</label>
                <select id="exercise" onchange="autoFill();"></select>

                <div id="add-action-box" style="display:none; background: #000; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #222;">
                    <input type="text" id="new-action-name" placeholder="新動作名稱...">
                    <select id="new-action-cat">
                        <option value="Back">🛶 背部</option>
                        <option value="Chest">🛡️ 胸部</option>
                        <option value="Shoulders">⚡ 肩膀</option>
                        <option value="Legs">🦵 下肢</option>
                        <option value="Abs">🔥 腹部</option>
                    </select>
                    <button class="btn-set primary" style="padding: 12px; font-size:14px;" onclick="saveNewAction()">確認新增</button>
                </div>
                <button style="background:none; color:var(--primary); border:none; font-size:11px; margin-bottom:20px; font-weight:bold;" onclick="toggleAddBox()">＋ 加入個人自定義動作</button>

                <div style="background: var(--primary-soft); padding: 18px; border-radius: 18px; border-left: 3px solid var(--primary);">
                    <label style="color: var(--primary); margin-bottom: 8px;">🔥 專業力學要領</label>
                    <ul id="quick-points" style="margin:0; padding-left:18px; color:#aaa; font-size:13.5px; line-height:1.7;"></ul>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 25px;">
                    <div><label>重量 kg</label><input type="number" id="weight" value="0" step="0.5"></div>
                    <div><label>次數</label><input type="number" id="reps" value="12"></div>
                    <div><label>總組數</label><input type="number" id="totalSets" value="4"></div>
                </div>

                <button class="btn-set primary" onclick="addExerciseSession()">紀錄本項總結數據</button>
            </div>

            <div id="history-list"></div>
            <button id="syncBtn" class="btn-sync" onclick="syncToGoogle()">☁️ 同步至雲端</button>
        </div>

        <!-- 進度分析 -->
        <div id="page-analysis" class="tab-content">
            <h2>📊 生涯成長進度</h2>
            
            <div class="evolution-card">
                <div class="rank-status" id="rank-prefix">Progression Status</div>
                <div class="rank-title" id="user-level">---</div>
                <div class="xp-container">
                    <div id="level-progress" class="xp-fill"></div>
                </div>
                <div class="xp-stats" id="next-level-hint">正在連線大腦數據...</div>
                <div class="xp-stats" id="milestone-compare" style="color: #444; margin-top: 15px;"></div>
            </div>

            <div id="analysis-loader">⏳ 正在同步歷史紀錄...</div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px;">
                <div style="background:#111; padding:22px; border-radius:30px; text-align:center; border: 1px solid #1a1a1a;">
                    <span style="font-size:10px; color:#444; display:block; margin-bottom:8px; font-weight:bold;">累積訓練量</span>
                    <span id="total-vol" style="display:block; color:var(--primary); font-size:20px; font-weight:900;">0 kg</span>
                </div>
                <div style="background:#111; padding:22px; border-radius:30px; text-align:center; border: 1px solid #1a1a1a;">
                    <span style="font-size:10px; color:#444; display:block; margin-bottom:8px; font-weight:bold;">歷史動作項</span>
                    <span id="total-sets" style="display:block; color:var(--primary); font-size:20px; font-weight:900;">0</span>
                </div>
            </div>

            <div class="card">
                <label>訓練體積趨勢 (最近 30 次)</label>
                <canvas id="volumeChart"></canvas>
            </div>
            
            <div class="card">
                <label>各肌群平衡發展趨勢 (戰力曲線)</label>
                <canvas id="muscleTrendChart"></canvas>
            </div>
            
            <button style="width:100%; background:none; border:1px solid #222; color:#333; padding:15px; border-radius:20px; font-size:11px; font-weight:bold;" onclick="fetchAndRenderAnalysis()">🔄 強制同步雲端分析</button>
        </div>

        <!-- 指南 -->
        <div id="page-recommend" class="tab-content">
            <h2>🏆 動作執行參考</h2>
            <div class="part-filter">
                <button class="part-btn active" onclick="setPart('Back', this)">背部</button>
                <button class="part-btn" onclick="setPart('Chest', this)">胸部</button>
                <button class="part-btn" onclick="setPart('Shoulders', this)">肩膀</button>
                <button class="part-btn" onclick="setPart('Legs', this)">下肢</button>
                <button class="part-btn" onclick="setPart('Abs', this)">腹部</button>
            </div>
            <div id="recommend-view"></div>
        </div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbxQsm2xWlTrKsqYpjazIlAbFlUSGndtBtZU-3r3xYdLnMYWT4cngY_FbO2kOxYOw3_Apg/exec";
        const DATA_KEY = 'gym_v29_data';
        const ACTION_KEY = 'gym_v29_actions';
        const APP_PWD = "8888"; 

        const coachDictionary = {
            "胸推": { points: ["對齊乳頭連線，肩胛後收下壓並貼死靠墊","手肘與軀幹呈 45-60 度角，嚴禁手肘與肩平行","推起時呼氣，頂端肘關節微彎不鎖死"] },
            "飛鳥": { points: ["保持手肘微彎固定。下往上針對上胸；平行針對中縫","想像抱大樹姿態，在中間感受胸肌強力擠壓","離心下放緩慢受控，感受胸肌深度延展"] },
            "滑輪下拉": { points: ["肩膀先「下沉並外旋」(挺胸感)，手僅是勾子","手肘朝側腹口袋方向下拉至上胸，夾緊背肌","回放時保持張力，感受背闊肌徹底被拉長"] },
            "划船": { points: ["背部平直不圓背。手肘貼近軀幹向後方拉","肩胛骨先收縮再拉重量，頂端停留一秒","控制離心回放，不要讓重量重摔"] },
            "硬舉": { points: ["槓鈴路徑貼近小腿。用「推地板」的感覺啟動","核心絕對鎖死保護腰椎，頂端臀部夾緊","下放時髖部先動(Hip Hinge)，保持背部平直"] },
            "保加利亞蹲": { points: ["重心放在前腳足中。軀幹微前傾增加臀部參與度","前膝穩定不內扣，垂直下蹲至大腿與地平行","後腳僅提供穩定，不參與發力"] },
            "腿推": { points: ["腳掌踩滿踏板中心。背與臀部全程貼死座墊","膝蓋不超過腳尖過多。頂端膝蓋微彎嚴禁鎖死"] },
            "棒式": { points: ["手肘位於肩膀正下方。收緊核心、夾緊臀部","身體從頭到腳成一直線，脖子放鬆看地面"] },
            "阿諾推舉": { points: ["底部手心朝內。推起時旋轉手腕至手心朝外","全程控制速度，保護肩關節與旋轉肌群穩定"] }
        };

        const genericRules = {
            "Back": { points: ["先下沉肩胛骨啟動","手肘引導路徑","徹底延展背肌"] },
            "Chest": { points: ["肩胛骨穩定貼靠","手肘微收勿平張","控制離心收縮"] },
            "Legs": { points: ["重心踩穩足中","核心緊繃保護腰椎","膝蓋不打直鎖死"] },
            "Shoulders": { points: ["肩膀下沉勿聳肩","動作緩慢受控","不利用身體擺盪"] },
            "Abs": { points: ["意識專注腹部收縮","下背部緊貼墊子","節奏緩慢、不借力"] }
        };

        const levelTitles = ["修行初心", "鍛鍊學徒", "入門行者", "重訓愛好", "進階鍛鍊", "鋼鐵意志", "肌肉常客", "區域精英", "專業行者", "資深玩家", "力量專家", "重量導師", "大師境界", "巔峰大師", "鋼鐵宗師", "傳奇人物", "半神境界", "超凡入聖", "力量化身", "極致泰坦"];

        let currentPart = 'Back';
        let muscleTrendChart = null; let volumeChart = null;
        let cloudData = []; 

        const defaultActions = [
            {n:"硬舉 (Deadlift)", c:"Legs"}, {n:"保加利亞蹲", c:"Legs"}, {n:"腿推 (Leg Press)", c:"Legs"}, {n:"腿前勾 (Extension)", c:"Legs"}, {n:"腿後勾 (Curl)", c:"Legs"}, {n:"臀推 (Hip Thrust)", c:"Legs"},
            {n:"滑輪下拉 (Lat Pulldown)", c:"Back"}, {n:"Cable 划船 (Cable Row)", c:"Back"}, {n:"坐式划船", c:"Back"}, {n:"反向飛鳥", c:"Back"},
            {n:"胸推 (Chest Press)", c:"Chest"}, {n:"Cable 飛鳥 (下往上)", c:"Chest"}, {n:"Cable 飛鳥 (平行)", c:"Chest"}, {n:"夾胸飛鳥", c:"Chest"},
            {n:"肩上推 (Shoulder Press)", c:"Shoulders"}, {n:"側平舉 (Lateral Raise)", c:"Shoulders"}, {n:"阿諾推舉", c:"Shoulders"},
            {n:"捲腹 (Crunch)", c:"Abs"}, {n:"棒式 (Plank)", c:"Abs"}, {n:"Cable 木砍 (Woodchop)", c:"Abs"}, {n:"仰臥舉腿", c:"Abs"}
        ];

        function checkLogin() {
            if(document.getElementById('login-pwd').value === APP_PWD) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('record-date').value = new Date().toISOString().split('T')[0];
                initSelect();
            } else { document.getElementById('login-err').style.display = 'block'; }
        }

        function initSelect() {
            const custom = JSON.parse(localStorage.getItem(ACTION_KEY)) || [];
            const all = [...defaultActions, ...custom];
            const groups = { Legs:"🦵 下肢", Back:"🛶 背部", Chest:"🛡️ 胸部", Shoulders:"⚡ 肩膀", Abs:"🔥 腹部" };
            let html = "";
            for(let key in groups) {
                html += `<optgroup label="${groups[key]}">`;
                all.filter(a => a.c === key).forEach(a => html += `<option value="${a.c}">${a.n}</option>`);
                html += `</optgroup>`;
            }
            document.getElementById('exercise').innerHTML = html;
            autoFill();
        }

        function toggleAddBox() { const b = document.getElementById('add-action-box'); b.style.display = b.style.display==='none'?'block':'none'; }
        function saveNewAction() {
            const name = document.getElementById('new-action-name').value;
            const cat = document.getElementById('new-action-cat').value;
            if(!name) return;
            let custom = JSON.parse(localStorage.getItem(ACTION_KEY)) || [];
            custom.push({n: name, c: cat});
            localStorage.setItem(ACTION_KEY, JSON.stringify(custom));
            document.getElementById('new-action-name').value = "";
            toggleAddBox(); initSelect();
        }

        function autoFill() {
            const ex = document.getElementById('exercise');
            const name = ex.options[ex.selectedIndex].text;
            const cat = ex.value;
            const data = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
            const last = data.find(i => i.name === name);
            document.getElementById('weight').value = last ? last.wt : 20;
            document.getElementById('reps').value = last ? last.rp : 12;
            const matched = coachDictionary[Object.keys(coachDictionary).find(k => name.includes(k))] || genericRules[cat];
            document.getElementById('quick-points').innerHTML = (matched.points || []).map(p => `<li>${p}</li>`).join('');
        }

        function addExerciseSession() {
            const dateVal = document.getElementById('record-date').value;
            const ex = document.getElementById('exercise');
            const name = ex.options[ex.selectedIndex].text;
            const type = ex.value;
            const wt = parseFloat(document.getElementById('weight').value) || 0;
            const rp = parseInt(document.getElementById('reps').value) || 0;
            const ts = parseInt(document.getElementById('totalSets').value) || 0;
            if(!ts || ts < 1) return alert("請輸入總組數");
            let data = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
            const dParts = dateVal.split('-');
            data.unshift({ id: Date.now(), name, type, wt, rp, totalSets: ts, date: `${dParts[1]}/${dParts[2]}`, rawDate: dateVal });
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
            renderHistory();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function renderHistory() {
            const data = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
            document.getElementById('history-list').innerHTML = data.map(i => `
                <div class="history-card">
                    <div class="history-main-info">
                        <div class="history-subtitle" style="font-size:10px; color:#444;">${i.date} | ${i.type}</div>
                        <div class="history-title">${i.name}</div>
                        <div class="history-data">${i.wt}kg x ${i.rp}下 x ${i.totalSets}組</div>
                    </div>
                    <div onclick="deleteItem(${i.id})" style="color:#222; padding:10px; cursor:pointer;">✕</div>
                </div>`).join('') || '<p style="text-align:center;color:#222;font-size:11px;margin-top:20px;">等待新紀錄登錄...</p>';
        }

        function deleteItem(id) {
            let data = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
            localStorage.setItem(DATA_KEY, JSON.stringify(data.filter(i => i.id !== id)));
            renderHistory();
        }

        function showPage(pId, navEl) {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pId).classList.add('active');
            navEl.classList.add('active');
            if (pId === 'analysis') { renderAnalysis(); fetchAndRenderAnalysis(); }
            if (pId === 'recommend') renderRecommend();
            window.scrollTo(0, 0);
        }

        function setPart(p, btn) { currentPart = p; document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderRecommend(); }

        function renderRecommend() {
            const custom = JSON.parse(localStorage.getItem(ACTION_KEY)) || [];
            const all = [...defaultActions, ...custom].filter(a => a.c === currentPart);
            document.getElementById('recommend-view').innerHTML = all.map(i => {
                const guide = coachDictionary[Object.keys(coachDictionary).find(k => i.n.includes(k))] || genericRules[i.c];
                return `<div class="rec-item"><div class="rec-head"><b class="rec-title">${i.n}</b></div><div class="rec-body" style="padding:15px;"><span class="rec-label" style="color:var(--primary); font-size:10px;">技術要領紀錄</span><ul class="rec-list" style="margin-top:5px; padding-left:15px; color:#999; font-size:13px; line-height:1.6;">${guide.points.map(p => `<li>${p}</li>`).join('')}</ul></div></div>`;
            }).join('');
        }

        async function fetchAndRenderAnalysis() {
            document.getElementById('analysis-loader').style.display = 'block';
            try {
                const resp = await fetch(gasUrl + "?t=" + Date.now());
                const result = await resp.json();
                if(Array.isArray(result)) cloudData = result;
            } catch (e) { console.log("FETCH_FAILED"); }
            document.getElementById('analysis-loader').style.display = 'none';
            renderAnalysis();
        }

        function renderAnalysis() {
            const localData = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
            const allData = [...cloudData, ...localData];
            if(!allData.length) return;

            const totalVol = allData.reduce((s,i) => s + (parseFloat(i.wt||0) * parseInt(i.rp||0) * parseInt(i.totalSets||1)), 0);
            document.getElementById('total-vol').innerText = Math.round(totalVol).toLocaleString() + " kg";
            document.getElementById('total-sets').innerText = allData.length;

            // --- V28+ 階梯難度系統 ---
            const baseStep = 4000;
            let level = 1; let currentLevelVol = 0; let nextLevelVol = 0;
            if (totalVol <= 40000) {
                level = Math.floor(totalVol / baseStep) + 1;
                currentLevelVol = (level - 1) * baseStep;
                nextLevelVol = level * baseStep;
                document.getElementById('rank-prefix').innerText = "Foundational Stage";
            } else {
                level = Math.floor(11 + Math.pow((totalVol - 40000) / 4000, 1/1.7));
                currentLevelVol = 40000 + Math.pow(level - 11, 1.7) * 4000;
                nextLevelVol = 40000 + Math.pow(level + 1 - 11, 1.7) * 4000;
                document.getElementById('rank-prefix').innerText = "Elite Evolution";
            }
            const rankIndex = Math.min(Math.floor((level - 1) / 5), levelTitles.length - 1);
            document.getElementById('user-level').innerText = `Lv.${level} ${levelTitles[rankIndex]}`;
            const progress = ((totalVol - currentLevelVol) / (nextLevelVol - currentLevelVol)) * 100;
            document.getElementById('level-progress').style.width = Math.min(progress, 100) + "%";
            document.getElementById('next-level-hint').innerText = `進度 ${progress.toFixed(1)}% | 距離晉級需 ${(nextLevelVol - totalVol).toLocaleString(undefined, {maximumFractionDigits:0})} kg`;

            const compareText = totalVol < 100000 ? `${(totalVol / 400).toFixed(1)} 台重機` : totalVol < 3000000 ? `${(totalVol / 5000).toFixed(1)} 隻非洲大象` : `${(totalVol / 200000).toFixed(2)} 隻藍鯨`;
            document.getElementById('milestone-compare').innerText = `生涯總訓練量相當於搬移了約 ${compareText}`;

            // --- 強化：圖表處理 (確保天數直線圖正確) ---
            const dailyTotal = {}; const dailyMuscle = {};
            allData.forEach(i => {
                const d = i.date; const v = (parseFloat(i.wt||0) * parseInt(i.rp||0) * parseInt(i.totalSets||1));
                dailyTotal[d] = (dailyTotal[d]||0) + v;
                if(!dailyMuscle[d]) dailyMuscle[d] = { Back:0, Chest:0, Legs:0, Shoulders:0, Abs:0 };
                dailyMuscle[d][i.type] = (dailyMuscle[d][i.type]||0) + v;
            });
            const sortedDates = Object.keys(dailyTotal).sort((a,b) => {
                const [mA, dA] = a.split('/').map(Number); const [mB, dB] = b.split('/').map(Number);
                return (mA * 100 + dA) - (mB * 100 + dB);
            }).slice(-30);

            if(volumeChart) volumeChart.destroy();
            const volCtx = document.getElementById('volumeChart').getContext('2d');
            volumeChart = new Chart(volCtx, {
                type:'line',
                data:{ labels:sortedDates, datasets:[{ label:'總訓練體積', data: sortedDates.map(d => Math.round(dailyTotal[d])), borderColor: '#00d1b2', backgroundColor: 'rgba(0,209,178,0.1)', fill: true, tension: 0.3, borderWidth: 3, pointRadius: 3, pointHoverRadius: 6 }] },
                options:{ responsive: true, scales:{ y:{ grid:{color:'#1a1a1a'}, ticks:{color:'#555', font:{size:10}} }, x:{ grid:{display:false}, ticks:{color:'#555', font:{size:9}} } }, plugins:{ legend:{display:false}, tooltip:{enabled:true} } }
            });

            if(muscleTrendChart) muscleTrendChart.destroy();
            const muscleCtx = document.getElementById('muscleTrendChart').getContext('2d');
            const mCols = { Back:'#00d1b2', Chest:'#4a69bd', Legs:'#ffdd57', Shoulders:'#ff4757', Abs:'#9b59b6' };
            const mLabels = { Back:'背部', Chest:'胸部', Legs:'下肢', Shoulders:'肩膀', Abs:'腹部' };
            
            muscleTrendChart = new Chart(muscleCtx, {
                type:'line',
                data: { 
                    labels: sortedDates, 
                    datasets: Object.keys(mCols).map(k => ({
                        label: mLabels[k], 
                        data: sortedDates.map(d => Math.round(dailyMuscle[d]?.[k] || 0)), 
                        borderColor: mCols[k], 
                        borderWidth: 2, 
                        tension: 0.3, 
                        pointRadius: 2, 
                        pointHoverRadius: 5,
                        fill: false
                    })) 
                },
                options:{ 
                    responsive: true, 
                    scales:{ 
                        y:{ grid:{color:'#1a1a1a'}, ticks:{color:'#444', font:{size:10}} }, 
                        x:{ grid:{display:false}, ticks:{color:'#444', font:{size:8}} } 
                    }, 
                    plugins:{ 
                        legend:{ position:'bottom', labels:{color:'#888', boxWidth:6, font:{size:10}, padding:15} },
                        tooltip:{enabled:true, mode:'index', intersect:false}
                    } 
                }
            });
        }

        async function syncToGoogle() {
            const data = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
            if (!data.length) return alert("無數據待同步");
            const btn = document.getElementById('syncBtn'); btn.innerText = "UPLOADING..."; btn.disabled = true;
            try {
                await fetch(gasUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ data: data }) });
                alert("🎉 同步成功！雲端歷史已更新。");
                localStorage.setItem(DATA_KEY, JSON.stringify(data.slice(0, 1)));
                renderHistory(); fetchAndRenderAnalysis();
            } catch (e) { alert("同步失敗，請檢查連線"); } finally { btn.innerText = "☁️ 同步至雲端"; btn.disabled = false; }
        }

        window.onload = () => { renderHistory(); fetchAndRenderAnalysis(); };
    </script>
</body>
</html>
